services:
  core:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    container_name: shipshare-core
    working_dir: /workspace
    command: >
      sh -c "mkdir -p /workspace/apps/core/data &&
      uv run --frozen --package shipshare-core python apps/core/manage.py migrate --noinput &&
      uv run --frozen --package shipshare-core python apps/core/manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,core}
      DJANGO_DB_ENGINE: django.db.backends.sqlite3
      DJANGO_DB_NAME: /workspace/apps/core/data/db.sqlite3
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:8000/auth/github/callback/}
      GITHUB_OAUTH_SCOPE: ${GITHUB_OAUTH_SCOPE:-read:user user:email}
      GITHUB_OAUTH_TOKEN_ENCRYPTION_KEY: ${GITHUB_OAUTH_TOKEN_ENCRYPTION_KEY:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_INSTALL_URL: ${GITHUB_APP_INSTALL_URL:-}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-shipshare-internal-secret}
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - core_data:/workspace/apps/core/data

  github-webhook-app:
    build:
      context: .
      dockerfile: apps/github-webhook-app/Dockerfile
    container_name: shipshare-github-webhook-app
    working_dir: /workspace
    command: >
      sh -c "mkdir -p /workspace/apps/github-webhook-app/data &&
      uv run --frozen --package shipshare-github-webhook-app uvicorn webhook_app.main:app --host 0.0.0.0 --port 8001"
    depends_on:
      - core
    environment:
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-local-webhook-secret}
      DJANGO_INTERNAL_BASE_URL: ${DJANGO_INTERNAL_BASE_URL:-http://core:8000}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-shipshare-internal-secret}
      WEBHOOK_DELIVERY_DB_PATH: /workspace/apps/github-webhook-app/data/webhook-deliveries.sqlite3
    ports:
      - "8001:8001"
    volumes:
      - .:/workspace
      - webhook_app_data:/workspace/apps/github-webhook-app/data

volumes:
  core_data:
  webhook_app_data:
